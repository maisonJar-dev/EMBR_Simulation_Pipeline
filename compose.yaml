services:

  # MARK: CANopen
  # Isolated ROS 2 CANopen and Gazebo simulation environment
  canopen-sim:
    build:
      context: .
      dockerfile: docker/CANopen-Spec-Dockerfile
    image: embr-bot:canopen-sim
    container_name: embr-bot-canopen-sim
    hostname: embr-canopen-sim

    stdin_open: true
    tty: true

    # Pass both Intel and NVIDIA DRM render nodes through to Gazebo. The
    # container runs as root, so host-specific named groups are not required.
    devices:
      - /dev/dri:/dev/dri

    # Allows the container to create/configure vcan0 when required.
    cap_add:
      - NET_ADMIN

    environment:
      - ROS_DOMAIN_ID=0
      - CANOPEN_WS=/workspace/canopen_ws
      - CAN_INTERFACE=${CAN_INTERFACE:-vcan0}
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker-xauthority

    volumes:
      - ./embr_sim/canopen_ws:/workspace/canopen_ws:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY}:/tmp/.docker-xauthority:ro

    # ROS 2 discovery and SocketCAN interfaces are shared with the host.
    network_mode: host
    ipc: host

    command: bash

  # MARK: NVIDIA O.N.S
  # Simulates Embr with computing constraints of the Nvidia Orin Nano Super
  nvidia-orin-nano-super-sim:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: embr-bot:orin-nano-super-sim
    container_name: embr-bot-orin-nano-super
    hostname: embr-orin-nano-super
    
    # Interactive terminal
    stdin_open: true
    tty: true
    
    # Environment variables
    environment:
      - ROS_DOMAIN_ID=0
    
    # Mount workspace for live development (optional)
    volumes:
      - ./ros2_ws:/workspace/ros2_ws:rw
    
    # Network configuration
    network_mode: host
    
    # Resource limits (simulating Nvidia Orin Nano Super)
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 2G
    
    # Keep container running
    command: /bin/bash

  # MARK: MTS
  # Service for running tests specific to our MTS (Mechanical Testing Suite)
  mechanical-reports:
    build: 
      context: . 
      dockerfile: docker/Dockerfile
    image: embr-bot:mts-dev
    container_name: embr-bot-mts
    hostname: embr-mts

    # Interactive Terminal
    stdin_open: true
    tty: true

    # Environment Variables
    environment:
      - ROS_DOMAIN_ID=0
    
    volumes:
      - ./ros2_ws:/workspace/ros2_ws:rw
    
    # Network Configuration
    network_mode: host

    # Keep container running
    command: ./generate_mechanical_report.sh
    restart: "no"
  
  # MARK: Cntrl Systms
  # Control System Service
  control-systems-dev:
    build: 
      context: . 
      dockerfile: docker/Gazebo-Dockerfile
      args: 
        USERNAME: ${USER}
    image: embr-bot:control-systems-dev
    container_name: embr-bot-control-systems
    hostname: embr-control-systems

    # Interactive Terminal
    stdin_open: true
    tty: true

    devices:
      - /dev/dri:/dev/dri

    # TODO: Make this modular for other machines GID's
    group_add:
      - video
      - render

    # Environment Variables
    environment:
      - ROS_DOMAIN_ID=0
      - USERNAME=${USER}
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker-xauthority
    
    volumes:
      - ./ros2_ws:/workspace/ros2_ws:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY}:/tmp/.docker-xauthority:ro
    
    # Network Configuration
    network_mode: host

    # Keep container running
    command: /bin/bash

  # MARK: PPO
  # PPO Reinforcement Learning Service
  ppo-dev:
    build: 
      context: . 
      dockerfile: docker/Dockerfile
    image: embr-bot:ppo-dev
    container_name: embr-bot-ppo
    hostname: embr-ppo

    # Interactive Terminal
    stdin_open: true
    tty: true

    # Environment Variables
    environment:
      - ROS_DOMAIN_ID=0
    
    volumes:
      - ./ros2_ws:/workspace/ros2_ws:rw
    
    # Network Configuration
    network_mode: host

    # Keep container running
    command: /bin/bash
